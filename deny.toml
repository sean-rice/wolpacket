# cargo-deny configuration
# Run with: `cargo deny check`

[graph]
all-features = false
no-default-features = false

[advisories]
ignore = [
    "RUSTSEC-2024-0436",  # paste is unmaintained, transitive via ratatui
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSL-1.0",
    "Unicode-3.0",
    "Zlib",
]
exceptions = []

[bans]
deny = []
allow = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
